<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Styleguide - Techium</title>
    <meta name="description" content="Techium is a digital agency">
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="icon" type="image/png" href="./favicon.png">
  </head>
  <body>
    <header>
      <div class="container">
        <div class="header-logo">
          <a href="/">
            <img src="logo-black.png" alt="Techium logo" width="160" height="40">
          </a>
        </div>
      </div>
    </header>
    <main>
      <h1>Styleguide</h1>

      <!-- Headings section -->
      <section>
        <header>
          <h2>Headings</h2>
        </header>
        <h1>H1 heading</h1>
        <h2>H2 heading</h2>
        <h3>H3 heading</h3>
        <h4>H4 heading</h4>
        <h5>H5 heading</h5>
        <h6>H6 heading</h6>
      </section>

      <!-- Glyphs section -->
      <section>
        <header>
          <h2>Glyphs</h2>
        </header>
        <ul class="nav">
          <li><i class="holberton_icon-menu"></i></li>
          <li><i class="holberton_icon-check"></i></li>
          <li><i class="holberton_icon-close"></i></li>
          <li><i class="holberton_icon-mouse"></i></li>
          <li><i class="holberton_icon-arrow-up"></i></li>
          <li><i class="holberton_icon-arrow-down"></i></li>
          <li><i class="holberton_icon-arrow-left"></i></li>
          <li><i class="holberton_icon-arrow-right"></i></li>
        </ul>
      </section>

      <!-- Details section -->
      <section>
        <header>
          <h2>Details</h2>
        </header>
        <details>
          <summary>Show more</summary>
          <p>This is some more information about the styleguide.</p>
        </details>
      </section>

      <!-- Video -->
      <section>
        <header>
          <h2>Video</h2>
        </header>
        <video controls loop poster="https://intranet-projects-files.s3.amazonaws.com/webstack/thumbnail.jpg">
          <source src="https://intranet-projects-files.s3.amazonaws.com/webstack/BigBuckBunny.mp4" type="video/mp4">
          Sorry, your browser doesn't support HTML5 video
        </video>
      </section>

    </main>
    <footer>
      <div class="container">
        <img src="logo-black.png" alt="Techium logo" width="160" height="40">
        <address>
          972 Mission St. San Francisco, CA 94103
        </address>
      </div>
    </footer>
  </body>
</html>
